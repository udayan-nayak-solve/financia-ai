# config/config.yaml
project:
  name: "Lending Opportunity Platform"
  version: "1.0.0"
  
paths:
  data_raw: "data/raw"
  data_processed: "data/processed"
  models: "data/models"
  outputs: "data/outputs"
  logs: "logs"

data_sources:
  hmda:
    filename: "hmda_data.csv"
    required_columns:
      - "census_tract"
      - "county_code"
      - "loan_amount"
      - "applicant_income"
      - "loan_type"
      - "action_taken"
      - "lender_name"
      - "loan_purpose"
  
  gse:
    filename: "gse_data.csv"
    required_columns:
      - "census_tract"
      - "original_loan_amount"
      - "original_interest_rate"
      - "loan_term"
      - "ltv_ratio"
      - "dti_ratio"
      - "borrower_credit_score"
  
  hpi:
    filename: "hpi_data.csv"
    required_columns:
      - "census_tract"
      - "year"
      - "quarter"
      - "hpi_value"
  
  unemployment:
    filename: "unemployment_data.csv"
    required_columns:
      - "county_code"
      - "year"
      - "month"
      - "unemployment_rate"
  
  census:
    filename: "census_data.csv"
    required_columns:
      - "census_tract"
      - "population"
      - "median_income"
      - "median_age"

feature_engineering:
  hmda_features:
    - "loan_volume"
    - "approval_rate"
    - "avg_loan_amount"
    - "denial_rate"
    - "market_concentration"
    - "client_market_share"
  
  economic_features:
    - "hpi_growth_1yr"
    - "hpi_growth_3yr"
    - "unemployment_trend"
    - "income_growth"
  
  gse_features:
    - "avg_interest_rate"
    - "avg_ltv"
    - "avg_dti"
    - "avg_credit_score"

model:
  opportunity_scoring:
    model_type: "ensemble"  # xgboost, random_forest, ensemble
    test_size: 0.2
    random_state: 42
    cv_folds: 5
    
  # Enhanced loan prediction model training configuration
  loan_prediction:
    optimize_for_speed: false  # Set to true for 6x faster training with minimal accuracy loss
    # When optimize_for_speed is true:
    # - Uses 2 models instead of 3 (Random Forest + XGBoost)
    # - Reduces hyperparameter search space
    # - Uses 3-fold CV instead of 5-fold
    # - Results in ~0.3% accuracy loss but 6x speed improvement
    
  hyperparameters:
    xgboost:
      n_estimators: 100
      max_depth: 6
      learning_rate: 0.1
      subsample: 0.8
      colsample_bytree: 0.8
    
    random_forest:
      n_estimators: 100
      max_depth: 10
      min_samples_split: 5
      min_samples_leaf: 2

scoring:
  weights:
    market_opportunity: 0.35
    economic_indicators: 0.25
    competition_level: 0.20
    risk_factors: 0.20
  
  # Dynamic weighting thresholds
  volatility_threshold: 15  # When to use high volatility weights
  
  # Advanced composite score weights
  composite_weights:
    high_volatility:
      market_access: 0.3
      risk_stability: 0.5
      macro_sensitivity: 0.2
    low_volatility:
      market_access: 0.5
      risk_stability: 0.3
      macro_sensitivity: 0.2
  
  thresholds:
    high_opportunity: 70
    medium_opportunity: 40
    low_opportunity: 0
  
  # Risk thresholds
  risk_thresholds:
    high_ltv: 90
    high_dti: 43
    high_unemployment: 8

# Clustering configuration
clustering:
  methods: ["kmeans", "dbscan", "hierarchical"]
  k_range: [3, 7]
  dbscan_eps: [0.3, 0.5, 0.7]
  min_samples_ratio: 0.05  # Minimum samples as ratio of dataset size

analysis:
  top_n_markets: 10
  min_loan_volume: 10
  competitor_threshold: 3

logging:
  level: "INFO"
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level} | {module}:{function}:{line} | {message}"
  rotation: "100 MB"
  retention: "30 days"